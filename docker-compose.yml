
services:
  package-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: package_db
    ports:
      - "5433:5432"
    volumes:
      - ./init/package_db.sql:/docker-entrypoint-initdb.d/package_db.sql

  vuln-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vuln_db
    ports:
      - "5434:5432"
    volumes:
      - ./init/vuln_db.sql:/docker-entrypoint-initdb.d/vuln_db.sql

  package-service:
    build: ./package-service
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://user:password@package-db:5432/package_db
      JWT_SECRET: supersecretkey-package
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    depends_on:
      - package-db

  vuln-service:
    build: ./vuln-service
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql://user:password@vuln-db:5432/vuln_db
      PACKAGE_SERVICE_URL: http://package-service:8001
      JWT_SECRET: supersecretkey-vuln
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    depends_on:
      - vuln-db
      - package-service

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - package-service
      - vuln-service

networks:
  default:
    name: package-vuln-tracker-network
