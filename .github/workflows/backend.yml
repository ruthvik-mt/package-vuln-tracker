name: Backend CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff pytest
        pip install -e backend-common
        pip install -r package-service/requirements.txt
        pip install -r vuln-service/requirements.txt
    
    - name: Lint with ruff
      run: ruff check .
    
    - name: Test with pytest
      run: |
        pytest package-service
        pytest vuln-service
