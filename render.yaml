# Render Infrastructure as Code (Blueprint)
# Final, 100% compliant schema for the Hybrid Stack deployment.

services:
  # 1. Package Service (FastAPI)
  - type: web
    name: ruthvik-vtrack-pkg-service
    runtime: docker
    dockerContext: ./package-service
    plan: free
    envVars:
      - key: DATABASE_URL
      - key: JWT_SECRET
        generateValue: true

  # 2. Vulnerability Service (FastAPI)
  - type: web
    name: ruthvik-vtrack-vuln-service
    runtime: docker
    dockerContext: ./vuln-service
    plan: free
    envVars:
      - key: DATABASE_URL
      - key: PACKAGE_SERVICE_URL
        fromService:
          type: web
          name: ruthvik-vtrack-pkg-service
          property: host
      - key: JWT_SECRET
        generateValue: true

  # 3. Frontend Dashboard (React/Vite)
  - type: web
    name: ruthvik-vtrack-dashboard
    runtime: docker
    dockerContext: ./frontend
    plan: free
    envVars:
      - key: VITE_PACKAGE_SERVICE_URL
        value: https://ruthvik-vtrack-pkg-service.onrender.com
      - key: VITE_VULN_SERVICE_URL
        value: https://ruthvik-vtrack-vuln-service.onrender.com
