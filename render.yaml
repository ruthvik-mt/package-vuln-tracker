# Render Infrastructure as Code (Blueprint)
# Using a SHARED database to comply with Render Free Tier limits (1 DB per account)

databases:
  - name: ruthvik-mt-shared-db
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere

services:
  # 1. Package Service (FastAPI)
  - type: web
    name: ruthvik-mt-package-service
    runtime: docker
    dockerContext: ./package-service
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ruthvik-mt-shared-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  # 2. Vulnerability Service (FastAPI)
  - type: web
    name: ruthvik-mt-vuln-service
    runtime: docker
    dockerContext: ./vuln-service
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ruthvik-mt-shared-db
          property: connectionString
      - key: PACKAGE_SERVICE_URL
        fromService:
          type: web
          name: ruthvik-mt-package-service
          property: host
      - key: JWT_SECRET
        generateValue: true

  # 3. Frontend Dashboard (React/Vite)
  - type: web
    name: ruthvik-mt-dashboard
    runtime: docker
    dockerContext: ./frontend
    plan: free
    envVars:
      - key: VITE_PACKAGE_SERVICE_URL
        value: https://ruthvik-mt-package-service.onrender.com
      - key: VITE_VULN_SERVICE_URL
        value: https://ruthvik-mt-vuln-service.onrender.com
