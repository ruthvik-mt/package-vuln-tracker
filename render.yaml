# Render Infrastructure as Code (Blueprint)
databases:
  # 1. Package Database (PostgreSQL)
  - name: package-db
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere

  # 2. Vulnerability Database (PostgreSQL)
  - name: vuln-db
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere

services:
  # 3. Package Service (FastAPI)
  - type: web
    name: package-service
    runtime: docker
    dockerContext: ./package-service
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: package-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  # 4. Vulnerability Service (FastAPI)
  - type: web
    name: vuln-service
    runtime: docker
    dockerContext: ./vuln-service
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vuln-db
          property: connectionString
      - key: PACKAGE_SERVICE_URL
        fromService:
          type: web
          name: package-service
          property: host
      - key: JWT_SECRET
        generateValue: true

  # 5. Frontend Dashboard (React/Vite)
  - type: web
    name: vulnerability-dashboard
    runtime: docker
    dockerContext: ./frontend
    plan: free
    envVars:
      - key: VITE_PACKAGE_SERVICE_URL
        fromService:
          type: web
          name: package-service
          property: host
      - key: VITE_VULN_SERVICE_URL
        fromService:
          type: web
          name: vuln-service
          property: host
