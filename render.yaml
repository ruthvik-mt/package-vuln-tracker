# Render Infrastructure as Code (Blueprint)
# NOTE: This requires a Render account that can create 2 free PostgreSQL databases.

databases:
  # 1. Package Database (PostgreSQL)
  - name: ruthvik-mt-package-db
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere

  # 2. Vulnerability Database (PostgreSQL)
  - name: ruthvik-mt-vuln-db
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere

services:
  # 3. Package Service (FastAPI)
  - type: web
    name: ruthvik-mt-package-service
    runtime: docker
    dockerContext: ./package-service
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ruthvik-mt-package-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  # 4. Vulnerability Service (FastAPI)
  - type: web
    name: ruthvik-mt-vuln-service
    runtime: docker
    dockerContext: ./vuln-service
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ruthvik-mt-vuln-db
          property: connectionString
      - key: PACKAGE_SERVICE_URL
        fromService:
          type: web
          name: ruthvik-mt-package-service
          property: host
      - key: JWT_SECRET
        generateValue: true

  # 5. Frontend Dashboard (React/Vite)
  - type: web
    name: ruthvik-mt-dashboard
    runtime: docker
    dockerContext: ./frontend
    plan: free
    envVars:
      - key: VITE_PACKAGE_SERVICE_URL
        value: https://ruthvik-mt-package-service.onrender.com
      - key: VITE_VULN_SERVICE_URL
        value: https://ruthvik-mt-vuln-service.onrender.com
